pipeline:
  name: myfrontend
  identifier: myfrontend
  projectIdentifier: uac
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: github
        build: <+input>
  stages:
    - stage:
        name: build
        identifier: build
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: true
          buildIntelligence:
            enabled: true
          execution:
            steps:
              - step:
                  type: Run
                  name: list
                  identifier: list
                  spec:
                    connectorRef: account.harnessImage
                    image: node-20
                    shell: Sh
                    command: ls
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: kubemine
              namespace: harness-delegate-ng
              automountServiceAccountToken: true
              nodeSelector: {}
              harnessImageConnectorRef: account.harnessImage
              os: Linux
        delegateSelectors:
          - kubernetes-delegate
