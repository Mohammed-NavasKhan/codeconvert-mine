pipeline:
  name: myfrontend
  identifier: myfrontend
  projectIdentifier: uac
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: github
        build: <+input>
  stages:
    - stage:
        name: build
        identifier: build
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: true
          buildIntelligence:
            enabled: true
          execution:
            steps:
              - stepGroup:
                  name: clone and inside project folder
                  identifier: clone_and_inside_project_folder
                  steps:
                    - step:
                        type: Run
                        name: Run_1
                        identifier: Run_1
                        spec:
                          connectorRef: public_docker
                          image: alpine:latest
                          shell: Sh
                          command: |-
                            echo "Running Command"
                            cd frontend
                            echo "Inside Project Root Folder"
              - step:
                  type: BuildAndPushDockerRegistry
                  name: BuildAndPushDockerRegistry_1
                  identifier: BuildAndPushDockerRegistry_1
                  spec:
                    connectorRef: dockerconnector
                    repo: mohammednavasdocker/harnessdev
                    tags:
                      - frontend
                    caching: true
                    dockerfile: frontend/Dockerfile
                    context: frontend
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: kubemine
              namespace: harness-delegate-ng
              automountServiceAccountToken: true
              nodeSelector: {}
              harnessImageConnectorRef: account.harnessImage
              os: Linux
        delegateSelectors:
          - kubernetes-delegate
