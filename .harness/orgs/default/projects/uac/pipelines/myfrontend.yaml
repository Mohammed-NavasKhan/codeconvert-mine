pipeline:
  name: myfrontend
  identifier: myfrontend
  projectIdentifier: uac
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: github
        build: <+input>
  stages:
    - stage:
        name: build
        identifier: build
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: true
          buildIntelligence:
            enabled: true
          execution:
            steps:
              - step:
                  type: Run
                  name: Command
                  identifier: Run_1
                  spec:
                    connectorRef: public_docker
                    image: alpine:latest
                    shell: Sh
                    command: |-
                      cd frontend
                      echo "Inside Frontend Folder"
              - step:
                  type: BuildAndPushDockerRegistry
                  name: BuildAndPushDockerRegistry_1
                  identifier: BuildAndPushDockerRegistry_1
                  spec:
                    connectorRef: dockerconnector
                    repo: harnessdev
                    tags:
                      - frontend
                    caching: true
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: kubemine
              namespace: harness-delegate-ng
              automountServiceAccountToken: true
              nodeSelector: {}
              harnessImageConnectorRef: account.harnessImage
              os: Linux
        delegateSelectors:
          - kubernetes-delegate
